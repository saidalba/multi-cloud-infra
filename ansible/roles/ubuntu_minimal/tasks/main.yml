---
- name: Update apt cache and upgrade all packages
  ansible.builtin.apt:
    update_cache: true
    upgrade: full
    cache_valid_time: 3600
    autoremove: true

- name: Create non-root sudo user
  ansible.builtin.user:
    name: "{{ admin_user }}"
    groups: sudo
    shell: /bin/bash
    append: true
    create_home: true

- name: Allow passwordless sudo for admin user
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ admin_user }}"
    content: "{{ admin_user }} ALL=(ALL) NOPASSWD:ALL\n"
    mode: "0440"
    validate: "visudo -cf %s"

- name: Authorize SSH public key for admin user
  ansible.posix.authorized_key:
    user: "{{ admin_user }}"
    key: "{{ lookup('file', admin_ssh_public_key_path) }}"
    state: present

- name: Harden SSH daemon configuration
  ansible.builtin.template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config.d/99-hardening.conf
    owner: root
    group: root
    mode: "0644"
    validate: "sshd -t -f %s"
  notify: Restart sshd

- name: Install UFW, fail2ban, unattended-upgrades, and baseline tools
  ansible.builtin.apt:
    name:
      - ufw
      - fail2ban
      - unattended-upgrades
      - curl
      - git
      - htop
    state: present

- name: Allow SSH port through UFW
  community.general.ufw:
    rule: allow
    port: "{{ ssh_port }}"
    proto: tcp

- name: Set UFW default incoming policy to deny
  community.general.ufw:
    direction: incoming
    policy: deny

- name: Set UFW default outgoing policy to allow
  community.general.ufw:
    direction: outgoing
    policy: allow

- name: Enable UFW
  community.general.ufw:
    state: enabled

- name: Configure fail2ban sshd jail
  ansible.builtin.template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: "0644"
  when: fail2ban_enabled
  notify: Restart fail2ban

- name: Enable and start fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    enabled: true
    state: started
  when: fail2ban_enabled

- name: Enable unattended security upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
    mode: "0644"
  when: unattended_upgrades_enabled

- name: Ensure journald drop-in directory exists
  ansible.builtin.file:
    path: /etc/systemd/journald.conf.d
    state: directory
    mode: "0755"

- name: Limit journald log size and retention
  ansible.builtin.copy:
    dest: /etc/systemd/journald.conf.d/00-journal-size.conf
    content: |
      [Journal]
      SystemMaxUse={{ journald_max_use }}
      RuntimeMaxUse={{ journald_runtime_max_use }}
      MaxRetentionSec={{ journald_max_retention }}
    mode: "0644"
  notify: Restart systemd-journald

- name: Check for existing swap file
  ansible.builtin.stat:
    path: /swapfile
  register: ubuntu_minimal_swapfile_stat

- name: Create swap file
  ansible.builtin.command: fallocate -l {{ swap_size_mb }}M /swapfile
  when:
    - not ubuntu_minimal_swapfile_stat.stat.exists
    - swap_size_mb | int > 0
  changed_when: true

- name: Set swap file permissions
  ansible.builtin.file:
    path: /swapfile
    mode: "0600"
  when:
    - not ubuntu_minimal_swapfile_stat.stat.exists
    - swap_size_mb | int > 0

- name: Format swap file
  ansible.builtin.command: mkswap /swapfile
  when:
    - not ubuntu_minimal_swapfile_stat.stat.exists
    - swap_size_mb | int > 0
  changed_when: true

- name: Enable swap file
  ansible.builtin.command: swapon /swapfile
  when:
    - not ubuntu_minimal_swapfile_stat.stat.exists
    - swap_size_mb | int > 0
  changed_when: true

- name: Persist swap file in fstab
  ansible.posix.mount:
    path: none
    src: /swapfile
    fstype: swap
    opts: sw
    state: present
  when: swap_size_mb | int > 0

- name: Set system timezone
  community.general.timezone:
    name: "{{ timezone }}"

- name: Ensure locale is generated
  community.general.locale_gen:
    name: "{{ locale }}"
    state: present

- name: Set default locale
  ansible.builtin.command: "update-locale LANG={{ locale }}"
  changed_when: false

# node_exporter listens on 9100 but stays unreachable from the internet by
# default -- the earlier "UFW default incoming policy: deny" task blocks it
# same as everything else. Open 9100 yourself, restricted to your monitoring
# server's IP, if you want to scrape it remotely.
- name: Install Prometheus node_exporter
  ansible.builtin.apt:
    name: prometheus-node-exporter
    state: present
  when: node_exporter_enabled

- name: Enable and start node_exporter
  ansible.builtin.systemd:
    name: prometheus-node-exporter
    enabled: true
    state: started
  when: node_exporter_enabled

- name: Install cron and mail utilities for health-check alerts
  ansible.builtin.apt:
    name:
      - cron
      - mailutils
    state: present
  when: health_check_enabled

- name: Install disk/memory health-check script
  ansible.builtin.template:
    src: health-check.sh.j2
    dest: /usr/local/bin/health-check.sh
    owner: root
    group: root
    mode: "0755"
  when: health_check_enabled

- name: Schedule health-check via cron
  ansible.builtin.cron:
    name: "disk/memory health check"
    minute: "*/15"
    user: root
    job: /usr/local/bin/health-check.sh
  when: health_check_enabled and health_check_alert_email | length > 0
